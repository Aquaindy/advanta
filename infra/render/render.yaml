# Render blueprint for AdVanta.
# https://render.com/docs/blueprint-spec
#
# Provisions everything: Postgres, Redis, the FastAPI API (web), the Celery
# worker+beat, and the SPA as a free Render STATIC SITE (global CDN, no
# container). Domains for getadvanta.app are baked in. API + worker run on the
# `starter` plan (bump to `standard` when traffic grows).
#
# Secrets are `sync: false` (NOT stored here) — set them once in the Render
# dashboard after the first deploy. See docs/deployment.md for the full
# checklist. APP_SECRET_KEY + ENCRYPTION_KEY + LLM/OAuth/Paddle creds live in a
# shared env-var GROUP so the api and worker always use identical values
# (tokens encrypted by one service must decrypt in the other).

databases:
  - name: advanta-postgres
    plan: starter
    databaseName: advanta_ai
    user: advanta

# ---------------------------------------------------------------------------
# Shared secrets/config for the api + worker. DATABASE_URL / REDIS_URL are NOT
# here — they use fromDatabase/fromService, which env groups don't support, so
# each service declares them individually (both point at the same instances).
# ---------------------------------------------------------------------------
envVarGroups:
  - name: advanta-shared
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # Generated ONCE here and shared by every service that references the
      # group — no manual copy between api and worker.
      - key: APP_SECRET_KEY
        generateValue: true
      # Fernet key — generate and paste in the dashboard (see docs). Must be set
      # before the first real boot; the app refuses to start without it in prod.
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://getadvanta.app
      - key: BACKEND_URL
        value: https://api.getadvanta.app

      # --- LLM: Anthropic Sonnet for agents; gpt-5.4-mini for the Growth DNA
      #     background generation (cross-provider fast model needs the OpenAI key)
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: LLM_MODEL
        value: gpt-5.4-mini
      - key: LLM_FAST_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_API_KEY
        sync: false

      # --- Subscription billing: Paddle (Merchant of Record)
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_CLIENT_TOKEN
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_ENVIRONMENT
        value: production
      - key: PADDLE_PRICE_ID_STARTER
        sync: false
      - key: PADDLE_PRICE_ID_PRO
        sync: false
      - key: PADDLE_PRICE_ID_AGENCY
        sync: false

      # --- Google OAuth: integration client (Ads / GA4 / Search Console)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_LOGIN_CUSTOMER_ID
        sync: false
      # --- Google OAuth: "Sign in with Google" (separate client)
      - key: GOOGLE_LOGIN_CLIENT_ID
        sync: false
      - key: GOOGLE_LOGIN_CLIENT_SECRET
        sync: false
      - key: GOOGLE_LOGIN_REDIRECT_URI
        value: https://api.getadvanta.app/api/v1/auth/google/callback

      # --- Other ad platforms
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false

      # --- Email: outbound SMTP + inbound parse
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: INBOUND_EMAIL_DOMAIN
        sync: false
      - key: INBOUND_EMAIL_SECRET
        sync: false

      # --- Observability + misc (all optional)
      - key: SENTRY_DSN
        sync: false
      - key: PAGESPEED_API_KEY
        sync: false

services:
  - type: redis
    name: advanta-redis
    plan: starter
    ipAllowList: []  # internal-only

  - type: web
    name: advanta-api
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile.api
    dockerContext: .
    plan: starter
    # Readiness probe: returns 503 when Postgres or Redis is down so Render
    # pulls a brownout instance out of rotation (the bare /health is liveness
    # only and stays 200 even with a dead dependency).
    healthCheckPath: /api/v1/health/ready
    autoDeploy: true
    # Applies pending migrations before traffic shifts. Alembic is idempotent so
    # it's safe for both api + worker to run it; whichever deploys first applies.
    preDeployCommand: alembic upgrade head
    domains:
      - api.getadvanta.app
    # Blog-image uploads write to /app/uploads, which is EPHEMERAL on Render —
    # images are lost on every deploy/restart. For production use object storage
    # (S3 / Cloudflare R2). A persistent disk pins the service to one instance,
    # drops zero-downtime deploys, and needs an entrypoint chown (container runs
    # as uid 10001, Render mounts disks as root). Uncomment only if you accept that.
    # disk:
    #   name: advanta-uploads
    #   mountPath: /app/uploads
    #   sizeGB: 1
    envVars:
      - fromGroup: advanta-shared
      - key: DATABASE_URL
        fromDatabase:
          name: advanta-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: advanta-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://getadvanta.app","https://www.getadvanta.app"]'
      # Dispatch slow tasks to the worker instead of running them inline.
      - key: WORKERS_ENABLED
        value: "1"

  # Background worker + beat scheduler. SINGLE REPLICA only: `--beat` runs the
  # periodic scheduler in-process, so scaling this out would fire the monthly
  # fee accrual + autopilot scan once per replica. To scale workers, split beat
  # into its own dedicated single-replica service first.
  - type: worker
    name: advanta-worker
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile.api
    dockerContext: .
    plan: starter
    autoDeploy: true
    preDeployCommand: alembic upgrade head
    dockerCommand: celery -A app.core.celery_app.celery_app worker --beat --loglevel=info --concurrency=4
    envVars:
      - fromGroup: advanta-shared
      - key: DATABASE_URL
        fromDatabase:
          name: advanta-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: advanta-redis
          type: redis
          property: connectionString

  # Frontend SPA as a free Render STATIC SITE — global CDN, no container, $0.
  # Build runs the pnpm workspace and publishes apps/web/dist. The Docker nginx
  # image (infra/docker/Dockerfile.web + infra/nginx/spa.conf) is kept as the
  # "full nginx control" alternative and for the docker-compose stack.
  - type: web
    name: advanta-web
    runtime: static
    # Monorepo build: corepack picks up packageManager (pnpm@9.15.4) from the
    # root package.json. VITE_* below are injected as build env — Vite inlines
    # import.meta.env.VITE_* at build time.
    buildCommand: corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter @advanta/web build
    staticPublishPath: ./apps/web/dist
    autoDeploy: true
    domains:
      - getadvanta.app
      - www.getadvanta.app
    envVars:
      # Pin the build Node to match the Docker image (root engines: node >=20).
      - key: NODE_VERSION
        value: "20"
      # Must point at the API's public origin + /api/v1.
      - key: VITE_API_BASE_URL
        value: https://api.getadvanta.app/api/v1
      - key: VITE_APP_NAME
        value: AdVanta
    # SPA client routing: serve index.html for any path with no matching file.
    # Render serves real asset files first, so /assets/* still resolve directly.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Security headers ported from infra/nginx/spa.conf. script-src stays strict
    # 'self' (the theme bootstrap is externalized to public/theme-init.js);
    # allows Paddle (checkout overlay/cdn), Google (login), rsms.me (Inter font).
    # connect-src lists the API origin — update it if the API moves.
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' https://cdn.paddle.com https://*.paddle.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://rsms.me; font-src 'self' data: https://rsms.me; img-src 'self' data: blob: https:; connect-src 'self' https://api.getadvanta.app https://*.paddle.com; frame-src https://*.paddle.com https://accounts.google.com; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'"
